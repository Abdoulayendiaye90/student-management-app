<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestion des étudiants Pro - Abdoulaye Ndiaye</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      padding: 20px;
      color: #e2e8f0;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    h1 {
      text-align: center;
      color: white;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 25px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 14px;
      border: 1px solid #334155;
      border-radius: 10px;
      background: #1e293b;
      color: white;
      font-size: 1rem;
    }

    input::placeholder {
      color: #94a3b8;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .add-btn {
      background: #38bdf8;
      color: #0f172a;
    }

    .add-btn:hover {
      background: #7dd3fc;
    }

    .update-btn {
      background: #f59e0b;
      color: #111827;
    }

    .update-btn:hover {
      background: #fbbf24;
    }

    .cancel-btn {
      background: #64748b;
      color: white;
    }

    .cancel-btn:hover {
      background: #94a3b8;
      color: #0f172a;
    }

    .clear-btn {
      background: #ef4444;
      color: white;
    }

    .clear-btn:hover {
      background: #f87171;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }

    .stats {
      display: flex;
      justify-content: flex-start;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      color: #cbd5e1;
      font-size: 0.95rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 12px;
    }

    thead {
      background: #1e293b;
    }

    th, td {
      padding: 14px;
      text-align: left;
      border-bottom: 1px solid #334155;
    }

    th {
      color: #38bdf8;
    }

    tbody tr {
      background: #0f172a;
    }

    tbody tr:hover {
      background: #1e293b;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .edit-btn {
      background: #22c55e;
      color: white;
      padding: 8px 12px;
    }

    .edit-btn:hover {
      background: #4ade80;
      color: #0f172a;
    }

    .delete-btn {
      background: #ef4444;
      color: white;
      padding: 8px 12px;
    }

    .delete-btn:hover {
      background: #f87171;
    }

    .empty {
      text-align: center;
      color: #94a3b8;
      margin-top: 20px;
    }

    .message {
      margin-bottom: 15px;
      padding: 12px;
      border-radius: 10px;
      background: #052e16;
      color: #bbf7d0;
      display: none;
    }

    @media (max-width: 850px) {
      .toolbar {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      table, thead, tbody, th, td, tr {
        display: block;
      }

      thead {
        display: none;
      }

      tr {
        margin-bottom: 15px;
        border: 1px solid #334155;
        border-radius: 12px;
        overflow: hidden;
      }

      td {
        border-bottom: 1px solid #334155;
      }

      td::before {
        content: attr(data-label);
        font-weight: bold;
        display: block;
        color: #38bdf8;
        margin-bottom: 6px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gestion des étudiants Pro</h1>
    <p class="subtitle">Application de gestion avec recherche, tri, modification et sauvegarde locale</p>

    <div id="messageBox" class="message"></div>

    <div class="form-grid">
      <input type="text" id="name" placeholder="Nom complet" />
      <input type="number" id="age" placeholder="Âge" />
      <input type="text" id="program" placeholder="Programme" />
      <select id="status">
        <option value="">Choisir un statut</option>
        <option value="Actif">Actif</option>
        <option value="Inactif">Inactif</option>
      </select>
    </div>

    <div class="top-actions">
      <button class="add-btn" id="addButton" onclick="addStudent()">Ajouter un étudiant</button>
      <button class="update-btn" id="updateButton" onclick="updateStudent()" style="display: none;">Mettre à jour</button>
      <button class="cancel-btn" id="cancelButton" onclick="cancelEdit()" style="display: none;">Annuler</button>
      <button class="clear-btn" onclick="clearStudents()">Tout supprimer</button>
    </div>
   <div class="top-actions">
  <button class="add-btn" onclick="exportStudents()">Exporter JSON</button>
  <label class="add-btn" style="display:inline-block; text-align:center;">
    Importer JSON
    <input type="file" id="importFile" accept=".json" onchange="importStudents(event)" style="display:none;">
  </label>
</div>
    <div class="toolbar">
      <input
        type="text"
        id="search"
        placeholder="Rechercher par nom ou programme"
        oninput="renderStudents()"
      />

      <select id="sortField" onchange="renderStudents()">
        <option value="name">Trier par nom</option>
        <option value="program">Trier par programme</option>
        <option value="status">Trier par statut</option>
      </select>

      <select id="sortOrder" onchange="renderStudents()">
        <option value="asc">Ordre croissant</option>
        <option value="desc">Ordre décroissant</option>
      </select>
    </div>

    <div class="stats">
      <span id="totalStudents">Total : 0</span>
      <span id="activeStudents">Actifs : 0</span>
      <span id="inactiveStudents">Inactifs : 0</span>
    </div>

    <div id="tableContainer">
      <table>
        <thead>
          <tr>
            <th>Nom</th>
            <th>Âge</th>
            <th>Programme</th>
            <th>Statut</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="studentList"></tbody>
      </table>
    </div>

    <p id="emptyMessage" class="empty">Aucun étudiant enregistré.</p>
  </div>

  <script>
    const nameInput = document.getElementById('name');
    const ageInput = document.getElementById('age');
    const programInput = document.getElementById('program');
    const statusInput = document.getElementById('status');
    const searchInput = document.getElementById('search');
    const sortFieldInput = document.getElementById('sortField');
    const sortOrderInput = document.getElementById('sortOrder');
    const studentList = document.getElementById('studentList');
    const emptyMessage = document.getElementById('emptyMessage');
    const totalStudents = document.getElementById('totalStudents');
    const activeStudents = document.getElementById('activeStudents');
    const inactiveStudents = document.getElementById('inactiveStudents');
    const addButton = document.getElementById('addButton');
    const updateButton = document.getElementById('updateButton');
    const cancelButton = document.getElementById('cancelButton');
    const messageBox = document.getElementById('messageBox');

    let students = JSON.parse(localStorage.getItem('students')) || [];
    let editIndex = null;

    function saveStudents() {
      localStorage.setItem('students', JSON.stringify(students));
    }

    function showMessage(text) {
      messageBox.textContent = text;
      messageBox.style.display = 'block';

      setTimeout(() => {
        messageBox.style.display = 'none';
      }, 2500);
    }

    function updateStats() {
      const total = students.length;
      const active = students.filter(student => student.status === 'Actif').length;
      const inactive = students.filter(student => student.status === 'Inactif').length;

      totalStudents.textContent = 'Total : ' + total;
      activeStudents.textContent = 'Actifs : ' + active;
      inactiveStudents.textContent = 'Inactifs : ' + inactive;
    }

    function validateForm() {
      const name = nameInput.value.trim();
      const age = ageInput.value.trim();
      const program = programInput.value.trim();
      const status = statusInput.value;

      if (!name || !age || !program || !status) {
        alert('Veuillez remplir tous les champs.');
        return false;
      }

      if (Number(age) <= 0) {
        alert('Veuillez entrer un âge valide.');
        return false;
      }

      return true;
    }

    function getFormData() {
      return {
        name: nameInput.value.trim(),
        age: ageInput.value.trim(),
        program: programInput.value.trim(),
        status: statusInput.value
      };
    }

    function clearForm() {
      nameInput.value = '';
      ageInput.value = '';
      programInput.value = '';
      statusInput.value = '';
      nameInput.focus();
    }

    function addStudent() {
      if (!validateForm()) return;

      students.push(getFormData());
      saveStudents();
      renderStudents();
      clearForm();
      showMessage('Étudiant ajouté avec succès.');
    }

    function editStudent(index) {
      const student = students[index];

      nameInput.value = student.name;
      ageInput.value = student.age;
      programInput.value = student.program;
      statusInput.value = student.status;

      editIndex = index;
      addButton.style.display = 'none';
      updateButton.style.display = 'inline-block';
      cancelButton.style.display = 'inline-block';

      window.scrollTo({
        top: 0,
        behavior: 'smooth'
      });
    }

    function updateStudent() {
      if (editIndex === null) return;
      if (!validateForm()) return;

      students[editIndex] = getFormData();
      saveStudents();
      renderStudents();
      clearForm();
      cancelEdit();
      showMessage('Étudiant modifié avec succès.');
    }

    function cancelEdit() {
      editIndex = null;
      clearForm();
      addButton.style.display = 'inline-block';
      updateButton.style.display = 'none';
      cancelButton.style.display = 'none';
    }

    function deleteStudent(index) {
      const confirmation = confirm('Voulez-vous supprimer cet étudiant ?');
      if (!confirmation) return;

      students.splice(index, 1);
      saveStudents();
      renderStudents();

      if (editIndex === index) {
        cancelEdit();
      }

      showMessage('Étudiant supprimé avec succès.');
    }

    function clearStudents() {
      if (students.length === 0) return;

      const confirmation = confirm('Voulez-vous supprimer tous les étudiants ?');
      if (confirmation) {
        students = [];
        saveStudents();
        renderStudents();
        cancelEdit();
        showMessage('Tous les étudiants ont été supprimés.');
      }
    }

    function renderStudents() {
      studentList.innerHTML = '';

      const keyword = searchInput.value.toLowerCase().trim();
      const sortField = sortFieldInput.value;
      const sortOrder = sortOrderInput.value;

      let filteredStudents = students
        .map((student, index) => ({ ...student, originalIndex: index }))
        .filter(student =>
          student.name.toLowerCase().includes(keyword) ||
          student.program.toLowerCase().includes(keyword)
        );

      filteredStudents.sort((a, b) => {
        const valueA = a[sortField].toLowerCase();
        const valueB = b[sortField].toLowerCase();

        if (sortOrder === 'asc') {
          return valueA.localeCompare(valueB);
        } else {
          return valueB.localeCompare(valueA);
        }
      });

      if (filteredStudents.length === 0) {
        emptyMessage.style.display = 'block';
      } else {
        emptyMessage.style.display = 'none';
      }

      filteredStudents.forEach(student => {
        const row = document.createElement('tr');

        row.innerHTML = `
          <td data-label="Nom">${student.name}</td>
          <td data-label="Âge">${student.age}</td>
          <td data-label="Programme">${student.program}</td>
          <td data-label="Statut">${student.status}</td>
          <td data-label="Action">
            <div class="action-buttons">
              <button class="edit-btn" onclick="editStudent(${student.originalIndex})">Modifier</button>
              <button class="delete-btn" onclick="deleteStudent(${student.originalIndex})">Supprimer</button>
            </div>
          </td>
        `;

        studentList.appendChild(row);
      });

      updateStats();
    }

    renderStudents();
  </script>
</body>
</html>
